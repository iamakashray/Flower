<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blooming Flowers Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* Controls */
        .btn-play {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #ff477e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
            margin-bottom: 30px;
        }

        .btn-play:hover {
            background-color: #ff2a6d;
            transform: scale(1.05);
        }

        /* Garden Container */
        .garden {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Flower Base Elements */
        .flower {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            transform: scale(0); /* Initially hidden */
            transition: transform 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Stems */
        .stem {
            width: 6px;
            height: 200px;
            background: linear-gradient(to top, #134e4a, #10b981);
            border-radius: 4px;
        }

        /* Leaves */
        .leaf {
            position: absolute;
            width: 20px;
            height: 10px;
            background-color: #059669;
            border-radius: 10px 0;
            top: 50%;
        }
        .leaf.left { left: -15px; transform: rotate(-30deg); }
        .leaf.right { right: -15px; transform: rotate(30deg) scaleX(-1); }

        /* Flower Heads */
        .head {
            position: absolute;
            top: -35px;
            left: -17px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* Different Flower Types & Positions */
        /* Flower 1 (Center - Tulip style) */
        .f1 { left: 185px; }
        .f1 .head { background-color: #ff477e; border-radius: 50% 50% 0 0; }

        /* Flower 2 (Left - Sunflower style) */
        .f2 { left: 185px; }
        .f2 .stem { height: 180px; }
        .f2 .head { background-color: #fbbf24; border: 6px dashed #b45309; top: -30px; }

        /* Flower 3 (Right - Rose/Pink style) */
        .f3 { left: 185px; }
        .f3 .stem { height: 190px; }
        .f3 .head { background-color: #f43f5e; box-shadow: inset 0 0 10px #9f1239; }

        /* Flower 4 (Far Left) */
        .f4 { left: 185px; }
        .f4 .stem { height: 160px; }
        .f4 .head { background-color: #a855f7; }

        /* Flower 5 (Far Right) */
        .f5 { left: 185px; }
        .f5 .stem { height: 170px; }
        .f5 .head { background-color: #3b82f6; }


        /* Animation Triggers via JavaScript */
        .bloom .f1 { transform: scale(1) rotate(0deg); }
        .bloom .f2 { transform: scale(1) rotate(-25deg); }
        .bloom .f3 { transform: scale(1) rotate(25deg); }
        .bloom .f4 { transform: scale(1) rotate(-45deg); }
        .bloom .f5 { transform: scale(1) rotate(45deg); }

        /* Subtle wind sway animation after blooming */
        .bloom .flower {
            animation: sway 4s ease-in-out infinite alternate;
        }
        .bloom .f1 { animation-delay: 0.2s; }
        .bloom .f2 { animation-delay: 0.5s; }
        .bloom .f3 { animation-delay: 0.8s; }
        .bloom .f4 { animation-delay: 1.1s; }
        .bloom .f5 { animation-delay: 1.4s; }

        @keyframes sway {
            0% { transform: scale(1) rotate(var(--rot-start)); }
            100% { transform: scale(1) rotate(var(--rot-end)); }
        }

        /* Specific rotation angles for realistic spread */
        .f1 { --rot-start: -2deg; --rot-end: 2deg; }
        .f2 { --rot-start: -27deg; --rot-end: -22deg; }
        .f3 { --rot-start: 22deg; --rot-end: 27deg; }
        .f4 { --rot-start: -48deg; --rot-end: -42deg; }
        .f5 { --rot-start: 42deg; --rot-end: 48deg; }

    </style>
</head>
<body>

    <h1>POV: Digital Flower Bouquet 🌸</h1>
    
    <!-- Play Button -->
    <button class="btn-play" id="playBtn">Play Animation</button>

    <!-- Bouquet Container -->
    <div class="garden" id="garden">
        
        <!-- Flower 1 (Center) -->
        <div class="flower f1">
            <div class="head"></div>
            <div class="stem">
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
        </div>

        <!-- Flower 2 -->
        <div class="flower f2">
            <div class="head"></div>
            <div class="stem">
                <div class="leaf left"></div>
            </div>
        </div>

        <!-- Flower 3 -->
        <div class="flower f3">
            <div class="head"></div>
            <div class="stem">
                <div class="leaf right"></div>
            </div>
        </div>

        <!-- Flower 4 -->
        <div class="flower f4">
            <div class="head"></div>
            <div class="stem">
                <div class="leaf left"></div>
            </div>
        </div>

        <!-- Flower 5 -->
        <div class="flower f5">
            <div class="head"></div>
            <div class="stem">
                <div class="leaf right"></div>
            </div>
        </div>

    </div>

    <script>
        const playBtn = document.getElementById('playBtn');
        const garden = document.getElementById('garden');

        playBtn.addEventListener('click', () => {
            // Toggle the 'bloom' class to play or reset animation
            if (garden.classList.contains('bloom')) {
                garden.classList.remove('bloom');
                playBtn.innerText = 'Play Animation';
            } else {
                garden.classList.add('bloom');
                playBtn.innerText = 'Reset';
            }
        });
    </script>
</body>
</html>

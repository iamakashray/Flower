<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmer's Flowers</title>
    <style>
        body {
            background-color: #131b21;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
        }

        svg#flower-frame {
            height: 60vh;
            width: 100%;
            max-width: 500px;
        }

        .flower-part {
            opacity: 0;
            transform: scale(0.8);
            transform-origin: center bottom;
            transition: all 1.2s ease-in-out;
        }

        .animate .flower-part {
            opacity: 1;
            transform: scale(1);
        }

        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.6s; }
        .delay-3 { transition-delay: 1.0s; }

        .play-btn {
            margin-top: 20px;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            color: #131b21;
            background-color: #ffb7b2;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 183, 178, 0.4);
            transition: 0.3s;
        }

        .play-btn:hover {
            background-color: #ff9aa2;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg id="flower-frame" viewBox="0 0 200 200">
            <g id="MainFlowerGroup">
                <path class="flower-part delay-1" d="M 100,180 Q 40,140 50,80" fill="none" stroke="#2a9d8f" stroke-width="3" stroke-linecap="round"/>
                <path class="flower-part delay-2" d="M 65,130 Q 50,120 55,110 Q 70,120 65,130" fill="#e76f51"/>
                <path class="flower-part delay-3" d="M 52,100 Q 35,95 43,85 Q 58,90 52,100" fill="#e76f51"/>

                <path class="flower-part delay-1" d="M 100,180 Q 160,140 150,80" fill="none" stroke="#2a9d8f" stroke-width="3" stroke-linecap="round"/>
                <path class="flower-part delay-2" d="M 135,130 Q 150,120 145,110 Q 130,120 135,130" fill="#e76f51"/>
                <path class="flower-part delay-3" d="M 148,100 Q 165,95 157,85 Q 142,90 148,100" fill="#e76f51"/>

                <circle class="flower-part delay-3" cx="50" cy="80" r="8" fill="#e9c46a"/>
                <circle class="flower-part delay-3" cx="150" cy="80" r="8" fill="#e9c46a"/>
            </g>
        </svg>

        <br>
        <button class="play-btn" onclick="startAnimation()">Play Animation</button>
    </div>

    <script>
        function startAnimation() {
            const flowerGroup = document.getElementById('MainFlowerGroup');
            flowerGroup.classList.remove('animate');
            setTimeout(() => {
                flowerGroup.classList.add('animate');
            }, 50);
        }
    </script>

</body>
</html>
